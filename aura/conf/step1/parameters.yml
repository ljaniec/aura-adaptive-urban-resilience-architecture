simulation:
  dt: 0.01
  steps: 700
  internal_steps: 80
  thermal_steps: 80

domain:
  nx: 500
  ny: 150
  dx: 0.2
  dy: 0.2

wind:
  mode: urban_canyon_profile
  velocity_mean: 0.11
  gust_strength: 0.035
  direction_deg: 0.0
  turbulence_intensity: 0.025
  seed: 123

building:
  width_cells: 90
  height_cells: 72
  x_center_ratio: 0.42
  y_center_ratio: 0.50
  on_ground: true
  ground_cells: 3

external_cfd:
  solver: lbm_d2q9
  lbm:
    tau: 0.57
    rho0: 1.0
    max_velocity: 0.16
    panel_permeability: 0.2
    steps: 700
    min_steps: 240
    inlet_perturbation: 0.04
    perturbation_period: 40
